<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>NWA Aviation Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app">
      <main id="map"></main>
      <aside id="sidebar">
        <header class="sidebar-header">
          <h1>NWA Flight Tracker</h1>
          <p class="sidebar-subtitle">All aircrafts within 150 miles of Rogers, AR</p>
          <p id="status" class="sidebar-status">Loading…</p>
        </header>
        <div id="flight-list" class="flight-list" role="list"></div>
      </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/icons.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
